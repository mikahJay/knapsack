# ─────────────────────────────────────────────────────────────
# Knapsack – stable non-prod Docker stack
# Run:  docker compose up --build
# Uses built runtime images instead of watcher-based dev servers to avoid
# Windows/Docker bind-mount reload instability.
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: knapsack
      POSTGRES_USER: knapsack
      POSTGRES_PASSWORD: knapsack
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knapsack"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      target: production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      IS_PROD: "false"
      PORT: 4000
      DATABASE_URL: postgres://knapsack:knapsack@db:5432/knapsack
      SESSION_SECRET: local-dev-secret-change-in-prod
      MATCHER_URL: http://matcher:5000
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-haiku-4-5-20251001}"
      BULK_IMPORT_LOWEST_TOKEN_LIMIT: "${BULK_IMPORT_LOWEST_TOKEN_LIMIT:-200000}"
      # Google OAuth (not needed in non-prod, but define for completeness)
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      WEB_URL: http://localhost:3000
    ports:
      - "4000:4000"

  matcher:
    build:
      context: ./matcher
      target: production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://knapsack:knapsack@db:5432/knapsack
      PORT: 5000
      MATCHER_MODE: api+scheduler
      # Interval between scheduled partial rematches (default: 1 h)
      MATCH_CRON_INTERVAL_MS: "3600000"
      # Active matching strategy — swap to another registered strategy name to change engine
      MATCHING_STRATEGY: claude
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-haiku-4-5-20251001}"
    ports:
      - "5000:5000"

  web:
    build:
      context: ./web
      target: production
    restart: unless-stopped
    depends_on:
      - api
    environment:
      IS_PROD: "false"
      NEXT_PUBLIC_IS_PROD: "false"
      NEXT_PUBLIC_API_URL: http://localhost:4000
      # Internal URL (container-to-container)
      API_URL: http://api:4000
      # Force polling so file-change events reach Next.js inside Docker on
      # Windows / macOS where host FS events are not forwarded to containers.
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"

  analytics:
    build:
      context: ./analytics
    depends_on:
      db:
        condition: service_healthy
    environment:
      DBT_DB_HOST: db
      DBT_DB_PORT: 5432
      DBT_DB_NAME: knapsack
      DBT_DB_USER: knapsack
      DBT_DB_PASSWORD: knapsack
    profiles:
      # Only run with: docker compose --profile analytics up
      - analytics

volumes:
  postgres-data:
